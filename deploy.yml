apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: zomato
  name: zomato-deploy
spec:
  replicas: 10
  selector:
    matchLabels:
      app: zomato
  template:
    metadata:
      labels:
        app: zomato
    spec:
      containers:
      - name: cont1
        image: rahamshaik/zomatoproject:myzomatoimage
        ports:
          - containerPort: 80

